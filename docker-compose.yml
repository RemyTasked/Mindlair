version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meetcute-db
    environment:
      POSTGRES_USER: meetcute
      POSTGRES_PASSWORD: meetcute_password
      POSTGRES_DB: meetcute
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetcute"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: .
    container_name: meetcute-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://meetcute:meetcute_password@postgres:5432/meetcute?schema=public
      BASE_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173
      SESSION_SECRET: dev-session-secret-change-in-production
      JWT_SECRET: dev-jwt-secret-change-in-production
      # Add your API keys here or use .env file
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: meetcute-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

