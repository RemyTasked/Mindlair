name: Build Browser Extensions

on:
  push:
    tags:
      - 'ext-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/ext-v}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick librsvg2-bin

      - name: Generate icons
        working-directory: mindlair/apps/extension/icons
        run: |
          chmod +x generate-icons.sh
          ./generate-icons.sh

      - name: Build extensions
        working-directory: mindlair/apps/extension
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Update manifest versions
        working-directory: mindlair/apps/extension
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Update Chrome manifest
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" chrome/manifest.json
          
          # Update Firefox manifest
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" firefox/manifest.json

      - name: Create Chrome extension ZIP
        working-directory: mindlair/apps/extension
        run: |
          cd chrome
          zip -r ../mindlair-chrome-${{ steps.version.outputs.version }}.zip . -x "*.sh" -x "*.svg"

      - name: Create Firefox extension ZIP
        working-directory: mindlair/apps/extension
        run: |
          cd firefox
          zip -r ../mindlair-firefox-${{ steps.version.outputs.version }}.zip . -x "*.sh" -x "*.svg"

      - name: Create Edge extension ZIP (same as Chrome)
        working-directory: mindlair/apps/extension
        run: |
          cp mindlair-chrome-${{ steps.version.outputs.version }}.zip mindlair-edge-${{ steps.version.outputs.version }}.zip

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindlair-chrome-${{ steps.version.outputs.version }}
          path: mindlair/apps/extension/mindlair-chrome-${{ steps.version.outputs.version }}.zip

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindlair-firefox-${{ steps.version.outputs.version }}
          path: mindlair/apps/extension/mindlair-firefox-${{ steps.version.outputs.version }}.zip

      - name: Upload Edge extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindlair-edge-${{ steps.version.outputs.version }}
          path: mindlair/apps/extension/mindlair-edge-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: Mindlair Browser Extensions ${{ steps.version.outputs.version }}
          body: |
            ## Browser Extensions v${{ steps.version.outputs.version }}

            ### Installation

            **Chrome:**
            1. Download `mindlair-chrome-${{ steps.version.outputs.version }}.zip`
            2. Extract the ZIP file
            3. Open `chrome://extensions`
            4. Enable "Developer mode" (top right)
            5. Click "Load unpacked" and select the extracted folder

            **Firefox:**
            1. Download `mindlair-firefox-${{ steps.version.outputs.version }}.zip`
            2. Open `about:debugging`
            3. Click "This Firefox" → "Load Temporary Add-on"
            4. Select any file in the extracted folder

            **Edge:**
            1. Download `mindlair-edge-${{ steps.version.outputs.version }}.zip`
            2. Extract the ZIP file
            3. Open `edge://extensions`
            4. Enable "Developer mode" (bottom left)
            5. Click "Load unpacked" and select the extracted folder

            ---
            *Store versions coming soon!*
          files: |
            mindlair/apps/extension/mindlair-chrome-${{ steps.version.outputs.version }}.zip
            mindlair/apps/extension/mindlair-firefox-${{ steps.version.outputs.version }}.zip
            mindlair/apps/extension/mindlair-edge-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
