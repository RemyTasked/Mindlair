<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Neural network nodes representing belief mapping -->
  <!-- Central node -->
  <circle cx="256" cy="256" r="48" fill="url(#nodeGrad)"/>
  
  <!-- Surrounding nodes -->
  <circle cx="160" cy="160" r="28" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="352" cy="160" r="32" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="128" cy="280" r="24" fill="url(#nodeGrad)" opacity="0.85"/>
  <circle cx="384" cy="280" r="26" fill="url(#nodeGrad)" opacity="0.85"/>
  <circle cx="180" cy="380" r="30" fill="url(#nodeGrad)" opacity="0.8"/>
  <circle cx="332" cy="380" r="28" fill="url(#nodeGrad)" opacity="0.8"/>
  
  <!-- Connections -->
  <line x1="256" y1="256" x2="160" y2="160" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="352" y2="160" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="128" y2="280" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="384" y2="280" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="256" y1="256" x2="180" y2="380" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="256" x2="332" y2="380" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
  
  <!-- Cross connections -->
  <line x1="160" y1="160" x2="128" y2="280" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <line x1="352" y1="160" x2="384" y2="280" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <line x1="128" y1="280" x2="180" y2="380" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <line x1="384" y1="280" x2="332" y2="380" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
</svg>
