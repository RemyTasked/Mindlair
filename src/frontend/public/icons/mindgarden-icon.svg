<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    
    <!-- Leaf gradient -->
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    
    <!-- White gradient for shine -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners for iOS maskable -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)"/>
  
  <!-- Main plant/sprout -->
  <g transform="translate(256, 256)">
    <!-- Stem -->
    <path 
      d="M0 80 Q-10 40, 0 -20 Q10 -80, 0 -120" 
      stroke="url(#shineGradient)" 
      stroke-width="16" 
      stroke-linecap="round" 
      fill="none"
    />
    
    <!-- Left large leaf -->
    <path 
      d="M-10 0 Q-100 -40, -120 -100 Q-100 -60, -60 -60 Q-20 -60, -10 0" 
      fill="url(#shineGradient)"
    />
    
    <!-- Right large leaf -->
    <path 
      d="M10 0 Q100 -40, 120 -100 Q100 -60, 60 -60 Q20 -60, 10 0" 
      fill="url(#shineGradient)"
    />
    
    <!-- Center small leaf (growing tip) -->
    <path 
      d="M0 -60 Q-40 -100, -30 -150 Q0 -120, 0 -60 Q0 -120, 30 -150 Q40 -100, 0 -60" 
      fill="url(#shineGradient)"
    />
    
    <!-- Small budding leaves -->
    <ellipse cx="-40" cy="-40" rx="15" ry="25" fill="url(#shineGradient)" transform="rotate(-30 -40 -40)" opacity="0.8"/>
    <ellipse cx="40" cy="-40" rx="15" ry="25" fill="url(#shineGradient)" transform="rotate(30 40 -40)" opacity="0.8"/>
    
    <!-- Pot -->
    <path 
      d="M-50 80 L-40 140 Q0 155, 40 140 L50 80 Z" 
      fill="url(#shineGradient)"
      opacity="0.9"
    />
    <rect x="-55" y="70" width="110" height="15" rx="5" fill="url(#shineGradient)" opacity="0.9"/>
    
    <!-- Soil -->
    <ellipse cx="0" cy="82" rx="45" ry="8" fill="#0d9488" opacity="0.4"/>
  </g>
  
  <!-- Sparkle accents -->
  <circle cx="380" cy="130" r="10" fill="white" opacity="0.7"/>
  <circle cx="400" cy="160" r="5" fill="white" opacity="0.5"/>
  <circle cx="130" cy="380" r="8" fill="white" opacity="0.6"/>
  <circle cx="110" cy="350" r="4" fill="white" opacity="0.4"/>
</svg>

