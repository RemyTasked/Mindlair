<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Translucent gradient for overlay use -->
    <linearGradient id="translucentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0.8"/>
    </linearGradient>
    
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  
  <!-- Main plant/sprout (no background - transparent) -->
  <g transform="translate(256, 256)">
    <!-- Stem -->
    <path 
      d="M0 80 Q-10 40, 0 -20 Q10 -80, 0 -120" 
      stroke="url(#leafGradient)" 
      stroke-width="20" 
      stroke-linecap="round" 
      fill="none"
    />
    
    <!-- Left large leaf -->
    <path 
      d="M-10 0 Q-100 -40, -120 -100 Q-100 -60, -60 -60 Q-20 -60, -10 0" 
      fill="url(#leafGradient)"
    />
    
    <!-- Right large leaf -->
    <path 
      d="M10 0 Q100 -40, 120 -100 Q100 -60, 60 -60 Q20 -60, 10 0" 
      fill="url(#leafGradient)"
    />
    
    <!-- Center small leaf (growing tip) -->
    <path 
      d="M0 -60 Q-40 -100, -30 -150 Q0 -120, 0 -60 Q0 -120, 30 -150 Q40 -100, 0 -60" 
      fill="url(#leafGradient)"
    />
    
    <!-- Small budding leaves -->
    <ellipse cx="-40" cy="-40" rx="15" ry="25" fill="url(#leafGradient)" transform="rotate(-30 -40 -40)" opacity="0.85"/>
    <ellipse cx="40" cy="-40" rx="15" ry="25" fill="url(#leafGradient)" transform="rotate(30 40 -40)" opacity="0.85"/>
    
    <!-- Pot -->
    <path 
      d="M-50 80 L-40 140 Q0 155, 40 140 L50 80 Z" 
      fill="#8B4513"
      opacity="0.9"
    />
    <rect x="-55" y="70" width="110" height="15" rx="5" fill="#A0522D" opacity="0.9"/>
    
    <!-- Soil -->
    <ellipse cx="0" cy="82" rx="45" ry="8" fill="#3E2723" opacity="0.6"/>
  </g>
</svg>

