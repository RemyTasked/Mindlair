<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for main elements -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Film camera clapperboard base -->
  <rect x="40" y="80" width="120" height="90" rx="8" fill="url(#brandGradient)"/>
  
  <!-- Clapperboard stripes -->
  <rect x="40" y="60" width="24" height="25" fill="url(#brandGradient)" opacity="0.8"/>
  <rect x="68" y="60" width="24" height="25" fill="white" opacity="0.9"/>
  <rect x="96" y="60" width="24" height="25" fill="url(#brandGradient)" opacity="0.8"/>
  <rect x="124" y="60" width="24" height="25" fill="white" opacity="0.9"/>
  <rect x="152" y="60" width="8" height="25" fill="url(#brandGradient)" opacity="0.8"/>
  
  <!-- Clapperboard top hinge -->
  <rect x="40" y="58" width="120" height="4" rx="2" fill="#1f2937"/>
  <circle cx="55" cy="60" r="3" fill="#374151"/>
  <circle cx="145" cy="60" r="3" fill="#374151"/>
  
  <!-- MC Monogram in center -->
  <text x="100" y="135" font-size="42" font-weight="bold" fill="white" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif" letter-spacing="-2">MC</text>
  
  <!-- Star accent (performance) -->
  <polygon points="100,30 103,38 111,38 105,43 107,51 100,46 93,51 95,43 89,38 97,38" fill="url(#accentGradient)"/>
  
  <!-- Focus rings (representing preparation) -->
  <circle cx="100" cy="100" r="90" stroke="url(#accentGradient)" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="100" cy="100" r="95" stroke="url(#accentGradient)" stroke-width="1" fill="none" opacity="0.2"/>
</svg>

