    <!-- Cache management -->
    <script>
      (function() {
        const FORCE_VERSION = '20260105000000'; // Mind Garden icon update
        const lastVersion = localStorage.getItem('mindgarden_force_version');
        
        if (lastVersion !== FORCE_VERSION) {
          console.log('🌱 Mind Garden - Clearing cache for update...');
          
          // Clear localStorage EXCEPT auth keys
          const keysToKeep = ['mindgarden_token', 'mindgarden_session_active', 'meetcute_token'];
          const savedValues = {};
          keysToKeep.forEach(key => {
            const value = localStorage.getItem(key);
            if (value) savedValues[key] = value;
          });
          
          localStorage.clear();
          
          // Restore saved values and migrate token name
          Object.keys(savedValues).forEach(key => {
            if (key === 'meetcute_token') {
              localStorage.setItem('mindgarden_token', savedValues[key]);
            } else {
              localStorage.setItem(key, savedValues[key]);
            }
          });
          
          // Clear caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) {
                console.log('🗑️ Clearing cache:', name);
                caches.delete(name);
              }
            });
          }
          
          // Unregister old service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for(let registration of registrations) {
                console.log('🔄 Updating service worker');
                registration.unregister();
              }
            });
          }
          
          localStorage.setItem('mindgarden_force_version', FORCE_VERSION);
          
          console.log('🌱 Mind Garden ready!');
          window.location.reload(true);
        }
      })();
    </script>
