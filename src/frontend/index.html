    <!-- NUCLEAR CACHE CLEAR - Runs before ANYTHING else -->
    <script>
      (function() {
        const FORCE_VERSION = '20251113214500'; // Fixed: Keep auth tokens during cache clear for PWA login persistence
        const lastVersion = localStorage.getItem('meetcute_force_version');
        
        if (lastVersion !== FORCE_VERSION) {
          console.log('🔥 NUCLEAR CACHE CLEAR - Forcing complete reset...');
          
          // Clear ALL localStorage EXCEPT auth-related keys
          const keysToKeep = ['meetcute_token', 'meetcute_session_active'];
          const savedValues = {};
          keysToKeep.forEach(key => {
            const value = localStorage.getItem(key);
            if (value) savedValues[key] = value;
          });
          
          localStorage.clear();
          
          // Restore saved values
          Object.keys(savedValues).forEach(key => {
            localStorage.setItem(key, savedValues[key]);
          });
          
          console.log('✅ Auth tokens preserved during cache clear');
          // Note: IndexedDB is NOT cleared - it persists automatically for better PWA login persistence
          
          // Clear ALL caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) {
                console.log('🗑️ Deleting cache:', name);
                caches.delete(name);
              }
            });
          }
          
          // Unregister ALL service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for(let registration of registrations) {
                console.log('🗑️ Unregistering service worker');
                registration.unregister();
              }
            });
          }
          
          // Set new version
          localStorage.setItem('meetcute_force_version', FORCE_VERSION);
          
          // Force hard reload (bypass cache)
          console.log('🔥 Forcing hard reload...');
          window.location.reload(true);
        }
      })();
    </script>
