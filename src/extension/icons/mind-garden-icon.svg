<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with garden gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#gardenGradient)"/>
  
  <!-- Garden ground/soil -->
  <ellipse cx="256" cy="380" rx="160" ry="40" fill="#059669" opacity="0.6"/>
  
  <!-- Main plant/flower stem -->
  <path d="M256 380 Q256 280, 256 200" stroke="#10b981" stroke-width="12" stroke-linecap="round" fill="none"/>
  
  <!-- Left leaf -->
  <path d="M256 300 Q200 260, 180 280 Q200 320, 256 300" fill="#10b981"/>
  
  <!-- Right leaf -->
  <path d="M256 260 Q312 220, 332 240 Q312 280, 256 260" fill="#10b981"/>
  
  <!-- Flower/bloom center (representing mind/wellness) -->
  <circle cx="256" cy="160" r="50" fill="#ecfdf5"/>
  
  <!-- Inner bloom pattern -->
  <circle cx="256" cy="160" r="35" fill="#6ee7b7"/>
  <circle cx="256" cy="160" r="20" fill="#10b981"/>
  
  <!-- Sparkle/growth indicators -->
  <circle cx="320" cy="140" r="8" fill="white" opacity="0.8"/>
  <circle cx="340" cy="180" r="5" fill="white" opacity="0.6"/>
  <circle cx="192" cy="130" r="6" fill="white" opacity="0.7"/>
  <circle cx="170" cy="170" r="4" fill="white" opacity="0.5"/>
  
  <!-- Small secondary plants -->
  <path d="M180 380 Q180 350, 180 330" stroke="#34d399" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="180" cy="315" r="15" fill="#6ee7b7"/>
  
  <path d="M332 380 Q332 345, 332 320" stroke="#34d399" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="332" cy="305" r="18" fill="#6ee7b7"/>
  
  <defs>
    <linearGradient id="gardenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#047857;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>

