<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindlayer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 20px;
      background: white;
      color: #18181b;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background: #18181b;
        color: #fafafa;
      }
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    
    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #71717a;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: #f4f4f5;
      border-radius: 10px;
      padding: 14px;
    }
    
    @media (prefers-color-scheme: dark) {
      .stat-card {
        background: #27272a;
      }
    }
    
    .stat-label {
      font-size: 11px;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 600;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }
    
    .btn-primary {
      background: #18181b;
      color: white;
      border: none;
    }
    
    .btn-primary:hover {
      background: #27272a;
    }
    
    @media (prefers-color-scheme: dark) {
      .btn-primary {
        background: #fafafa;
        color: #18181b;
      }
      
      .btn-primary:hover {
        background: #e4e4e7;
      }
    }
    
    .btn-secondary {
      background: transparent;
      color: #71717a;
      border: 1px solid #e4e4e7;
    }
    
    .btn-secondary:hover {
      background: #f4f4f5;
      color: #18181b;
    }
    
    @media (prefers-color-scheme: dark) {
      .btn-secondary {
        border-color: #3f3f46;
      }
      
      .btn-secondary:hover {
        background: #27272a;
        color: #fafafa;
      }
    }
    
    .footer {
      margin-top: 16px;
      text-align: center;
    }
    
    .footer a {
      font-size: 12px;
      color: #71717a;
      text-decoration: none;
    }
    
    .footer a:hover {
      color: #18181b;
    }
    
    @media (prefers-color-scheme: dark) {
      .footer a:hover {
        color: #fafafa;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Mindlayer</div>
    <div class="status">
      <span class="status-dot"></span>
      Active
    </div>
  </div>
  
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="pending-count">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="week-count">-</div>
    </div>
  </div>
  
  <div class="actions">
    <a href="http://localhost:3000/inbox" target="_blank" class="btn btn-primary">
      Open Dashboard
    </a>
    <a href="http://localhost:3000/map" target="_blank" class="btn btn-secondary">
      View Map
    </a>
  </div>
  
  <div class="footer">
    <a href="http://localhost:3000/settings" target="_blank">Settings</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
