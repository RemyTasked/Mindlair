<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindlayer</title>
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1916;
      --border: #2a2825;
      --text: #e8e4dc;
      --text-soft: #c4bfb4;
      --muted: #7a7469;
      --accent: #a3c47a;
      --amber: #b8a965;
      --red: #c75a5a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo svg { width: 20px; height: 20px; }

    .logo span {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .status-dot.paused { background: var(--amber); }
    .status-dot.disconnected { background: var(--red); }

    /* ── Setup view ── */
    .setup {
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .setup h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .setup p {
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.6;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .input-group input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-group input:focus {
      border-color: var(--accent);
    }

    .input-group input::placeholder {
      color: var(--muted);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
      font-size: 11px;
      padding: 6px 12px;
    }

    .error {
      font-size: 12px;
      color: var(--red);
      display: none;
    }

    /* ── Connected view ── */
    .dashboard {
      display: none;
      flex-direction: column;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .stat-card .value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-top: 2px;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
    }

    .controls .btn { flex: 1; }

    .toggle-btn {
      font-size: 12px;
      padding: 8px;
    }

    .recent-section {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }

    .recent-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
    }

    .recent-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .recent-item .title {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-item .meta {
      font-size: 10px;
      color: var(--muted);
      display: flex;
      gap: 8px;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    .footer a {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
    }

    .footer a:hover { color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
  <!-- ── Header ── -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#a3c47a" stroke-width="1.5"/>
        <circle cx="8" cy="10" r="2" fill="#a3c47a" opacity="0.7"/>
        <circle cx="15" cy="9" r="2.5" fill="#a3c47a"/>
        <circle cx="13" cy="15" r="1.5" fill="#a3c47a" opacity="0.5"/>
        <line x1="9.5" y1="10.5" x2="13" y2="9.5" stroke="#a3c47a" stroke-width="0.7" opacity="0.4"/>
        <line x1="14" y1="11" x2="13" y2="14" stroke="#a3c47a" stroke-width="0.7" opacity="0.4"/>
      </svg>
      <span>Mindlayer</span>
    </div>
    <div class="status-dot disconnected" id="statusDot"></div>
  </div>

  <!-- ── Setup (not connected) ── -->
  <div class="setup" id="setupView">
    <h2>Connect your account</h2>
    <p>Paste your API key from Mindlayer settings to start passively capturing what you read.</p>

    <div class="input-group">
      <label>Server URL</label>
      <input type="text" id="apiUrlInput" placeholder="https://mindlayer.app" value="http://localhost:3000">
    </div>

    <div class="input-group">
      <label>API Key</label>
      <input type="text" id="apiKeyInput" placeholder="ml_...">
    </div>

    <div class="error" id="connectError">Invalid API key or server unreachable.</div>

    <button class="btn btn-primary" id="connectBtn">Connect</button>
  </div>

  <!-- ── Dashboard (connected) ── -->
  <div class="dashboard" id="dashboardView">
    <div class="stats">
      <div class="stat-card">
        <div class="value" id="totalCaptures">0</div>
        <div class="label">Total Captures</div>
      </div>
      <div class="stat-card">
        <div class="value" id="pendingCount">0</div>
        <div class="label">Pending Sync</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-ghost toggle-btn" id="toggleBtn">Pause</button>
      <button class="btn btn-ghost toggle-btn" id="syncBtn">Sync Now</button>
    </div>

    <div class="recent-section">
      <h3>Recent captures</h3>
      <div class="recent-list" id="recentList">
        <div style="color: var(--muted); font-size: 12px; padding: 8px;">No captures yet. Start browsing!</div>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="openDashboard">Open Dashboard</a>
      <button class="btn btn-danger" id="disconnectBtn">Disconnect</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
